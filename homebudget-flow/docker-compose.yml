services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3003:8000"
    # FinTS: FINTS_PIN, FINTS_PRODUCT_ID, … (Kopie aus server/.env.example nach server/.env)
    env_file:
      - path: server/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://hb:hb@db:5432/homebudget
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hb
      POSTGRES_PASSWORD: hb
      POSTGRES_DB: homebudget
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hb -d homebudget"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
