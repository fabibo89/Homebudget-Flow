# Entwicklung: Postgres erreichbar vom Host + API mit Hot-Reload bei Codeänderungen.
# Nutzung:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Nur Datenbank (API lokal mit uvicorn --reload, siehe README):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up db

services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  api:
    volumes:
      - ./server/app:/app/app
      - earnings_docs:/app/data/verdienstnachweise
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  ui:
    image: node:20-alpine
    working_dir: /work/client
    volumes:
      - ./client:/work/client
      # Vite baut nach ../server/app/static/ui (siehe vite.config.ts) – muss ins Repo schreiben
      - ./server/app/static/ui:/work/server/app/static/ui
    command: ["sh", "-lc", "npm install && npm run build:watch"]

volumes:
  earnings_docs:
